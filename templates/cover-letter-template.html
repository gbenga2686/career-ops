<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    line-height: 1.65;
    color: #1a1a2e;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0.6in;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === HEADER (matches CV) === */
  .header { margin-bottom: 20px; }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 8px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: #555;
  }

  .contact-row a { color: #555; text-decoration: none; }
  .contact-row .separator { color: #ccc; }
  a { white-space: nowrap; }

  /* === LETTER BODY === */
  .letter-body {
    flex: 1;
    margin-top: 28px;
  }

  .recipient {
    margin-bottom: 20px;
  }

  .recipient-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a2e;
  }

  .recipient-company {
    font-size: 11px;
    color: hsl(270, 70%, 45%);
    font-weight: 500;
  }

  .paragraph {
    font-size: 11.5px;
    line-height: 1.7;
    color: #333;
    margin-bottom: 14px;
    text-align: left;
  }

  .proof-points {
    margin: 14px 0;
    padding-left: 20px;
  }

  .proof-points li {
    font-size: 11px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 6px;
  }

  .proof-points li strong {
    color: #1a1a2e;
    font-weight: 600;
  }

  /* === SIGN-OFF === */
  .sign-off {
    margin-top: 28px;
  }

  .sign-off-text {
    font-size: 11.5px;
    color: #333;
    margin-bottom: 6px;
  }

  .sign-off-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
    margin-top: 4px;
  }

  .sign-off-title {
    font-size: 10.5px;
    color: hsl(270, 70%, 45%);
    font-weight: 500;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER (same as CV) -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      {{PORTFOLIO_SECTION}}
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- LETTER BODY -->
  <div class="letter-body">

    <div class="recipient">
      <div class="recipient-name">{{HIRING_MANAGER}}</div>
      <div class="recipient-company">{{COMPANY}}</div>
    </div>

    <!-- Opening paragraph: hook + why this role/company -->
    <p class="paragraph">{{OPENING_PARAGRAPH}}</p>

    <!-- Proof points: 3 bullet points mapping CV to JD requirements -->
    <ul class="proof-points">
      {{PROOF_BULLETS}}
    </ul>

    <!-- Closing paragraph: ask + availability -->
    <p class="paragraph">{{CLOSING_PARAGRAPH}}</p>

    <!-- Sign-off -->
    <div class="sign-off">
      <div class="sign-off-text">Regards,</div>
      <div class="sign-off-name">{{NAME}}</div>
      <div class="sign-off-title">{{CANDIDATE_TITLE}}</div>
    </div>

  </div>

</div>
</body>
</html>
